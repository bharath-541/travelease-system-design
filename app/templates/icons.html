{% macro icon(name, size=20) -%}
<svg class="icon" width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  {% if name == "plane" %}
    <path d="M17.8 19 16 11l3.5-3.5c1.5-1.5 2-3.5 1-4.5s-3-.5-4.5 1L12.5 7.5 4 5l-2 2 7 4-3.5 3.5-2.5-.5-1.5 1.5 4 2 2 4L9 20l-.5-2.5L12 14l4 7z"/>
  {% elif name == "hotel" %}
    <path d="M3 21v-8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8"/><path d="M3 17h18"/><path d="M7 11V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v6"/><path d="M9 7h.01M15 7h.01"/>
  {% elif name == "bus" %}
    <path d="M8 6v6M16 6v6M2 12h20M6 18h12"/><path d="M4 17V5a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M7 22v-3M17 22v-3"/>
  {% elif name == "train" %}
    <rect width="16" height="16" x="4" y="3" rx="2"/><path d="M4 11h16M8 19l-2 3M16 19l2 3M8 7h.01M16 7h.01"/>
  {% elif name == "package" %}
    <path d="m7.5 4.27 9 5.15M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="M3.3 7 12 12l8.7-5M12 22V12"/>
  {% elif name == "search" %}
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
  {% elif name == "arrow-right" %}
    <path d="M5 12h14M13 6l6 6-6 6"/>
  {% elif name == "shield" %}
    <path d="M20 13c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V5l8-3 8 3z"/><path d="m9 12 2 2 4-4"/>
  {% elif name == "card" %}
    <rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20M6 15h2"/>
  {% elif name == "check" %}
    <path d="m20 6-11 11-5-5"/>
  {% elif name == "x" %}
    <path d="M18 6 6 18M6 6l12 12"/>
  {% elif name == "clock" %}
    <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
  {% elif name == "pin" %}
    <path d="M20 10c0 5-8 12-8 12S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="2"/>
  {% elif name == "calendar" %}
    <rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
  {% elif name == "user" %}
    <circle cx="12" cy="8" r="4"/><path d="M4 22a8 8 0 0 1 16 0"/>
  {% elif name == "database" %}
    <ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/>
  {% elif name == "activity" %}
    <path d="M3 12h4l3-8 4 16 3-8h4"/>
  {% elif name == "server" %}
    <rect width="20" height="8" x="2" y="3" rx="2"/><rect width="20" height="8" x="2" y="13" rx="2"/><path d="M6 7h.01M6 17h.01"/>
  {% elif name == "home" %}
    <path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10M9 20v-6h6v6"/>
  {% elif name == "refresh" %}
    <path d="M20 7h-5V2M4 17h5v5"/><path d="M5.5 9A8 8 0 0 1 19 6l1 1M18.5 15A8 8 0 0 1 5 18l-1-1"/>
  {% elif name == "menu" %}
    <path d="M4 6h16M4 12h16M4 18h16"/>
  {% endif %}
</svg>
{%- endmacro %}
